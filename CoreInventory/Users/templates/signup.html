{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>CoreInventory - Signup</title>
<link rel="stylesheet" type="text/css" href="{% static 'CoreInventoryApp/users/css/signup.css' %}">
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2b5876,#4e4376);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1a5edb;
}

.message{
    margin-top:10px;
    text-align:center;
    font-size:14px;
}

.message a{
    color:#2c7be5;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>User Signup</h2>

<form id="signupForm">
{% csrf_token %}
<input type="text" id="username" placeholder="Username" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirm_password" placeholder="Confirm Password" required>
<select id="role">
<option value="manager">Manager</option>
<option value="staff">Staff</option>
</select>
<button type="submit" id="signupBtn">Signup</button>

<br>
<br>
<a href="{%url 'login_page'%}">Already a User?.</a>
</form>

<p class="message" id="userMessage"></p>
</div>

<script>
const csrftoken = document.cookie.split(";").find(c=>c.trim().startsWith("csrftoken="))?.split("=")[1];

/* Function to check if username/email exists */
async function checkUserExists() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;

    if(!username && !email) return;

    try {
        const response = await fetch(`http://127.0.0.1:8000/api/check-user/?username=${username}&email=${email}`, {
            headers: {"X-CSRFToken": csrftoken}
        });
        const data = await response.json();

        const msg = document.getElementById("userMessage");
        const signupBtn = document.getElementById("signupBtn");

        if(data.exists){
            msg.innerHTML = `User already exists. <a onclick="goToLogin()">Login here</a>`;
            signupBtn.disabled = true;
        } else {
            msg.innerText = "";
            signupBtn.disabled = false;
        }

    } catch(err){
        console.error("Error checking user:", err);
    }
}

/* Redirect to login */
function goToLogin(){
    window.location.href = "/login/";
}

/* Event listeners for real-time check */
document.getElementById("username").addEventListener("blur", checkUserExists);
document.getElementById("email").addEventListener("blur", checkUserExists);

/* Signup Form Submission */
document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const payload = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value,
        role: document.getElementById("role").value
    };

    try{
        const response = await fetch("http://127.0.0.1:8000/api/signup/", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "X-CSRFToken": csrftoken
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if(data.message){
            window.location.href = `/api/verify-page/?email=${payload.email}`;
        } else if(data.error){
            document.getElementById("userMessage").innerText = data.error;
        }

    } catch(err){
        console.error(err);
    }
});
</script>

</body>
</html>
