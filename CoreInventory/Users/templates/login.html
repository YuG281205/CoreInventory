{% load static %}

<!DOCTYPE html>

<html>

<head>
<title>Login - CoreInventory</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#2c3e50,#4ca1af);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:#3498db;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.signup{
    margin-top:15px;
    font-size:14px;
}

.signup a{
    color:#3498db;
    text-decoration:none;
}

.signup a:hover{
    text-decoration:underline;
}

#message{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="login-container">

<h2>CoreInventory Login</h2>

<form id="loginForm" method="POST">
{% csrf_token %}

<label>Email</label> <input type="email" id="email" name="email" required>

<label>Password</label> <input type="password" id="password" name="password" required>

<button type="submit">Login</button>

</form>

<div class="signup">
Don't have an account? 
<a href="{% url 'signup_page' %}">Sign up</a>
</div>

<p id="message"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    fetch("/api/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrftoken
        },
        body: JSON.stringify({ email, password })
    })
    .then(response => response.json())
    .then(data => {

        if(data.message){
            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = data.message;

            window.location.href = "/api/dashboard/";
        }
        else{
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = data.error || "Login failed";
        }

    })
    .catch(error => console.error("Error:", error));

});

</script>

</body>
</html>
