<!DOCTYPE html>

<html>
<head>
<title>Receipt List</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:40px;
}

h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

thead{
    background:#2c3e50;
    color:white;
}

th, td{
    padding:12px 15px;
    text-align:left;
}

tbody tr{
    border-bottom:1px solid #ddd;
}

tbody tr:nth-child(even){
    background:#f9f9f9;
}

tbody tr:hover{
    background:#eef3f7;
}

button{
    padding:6px 12px;
    border:none;
    background:#3498db;
    color:white;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    background:#2980b9;
}

</style>

</head>

<body>

<h2>Receipt List</h2>

<table>

<thead>
<tr>
<th>Warehouse</th>
<th>From</th>
<th>To</th>
<th>Contact</th>
<th>Schedule Date</th>
<th>Status</th>
<th>Print</th>
</tr>
</thead>

<tbody>

{% for r in receipts %}

<tr>
<td>{{ r.reference.w_name }}</td>
<td>{{ r.from_location }}</td>
<td>{{ r.to_location }}</td>
<td>{{ r.contact }}</td>
<td>{{ r.schedule_date }}</td>
<td>{{ r.status }}</td>
<td>
<button onclick="printRow(this)">Print</button>
</td>
</tr>
{% endfor %}

</tbody>

</table>

<script>

function printRow(button){

    const row = button.closest("tr").children;

    const warehouse = row[0].innerText;
    const from_loc = row[1].innerText;
    const to_loc = row[2].innerText;
    const contact = row[3].innerText;
    const date = row[4].innerText;
    const status = row[5].innerText;

    const printWindow = window.open("", "", "width=700,height=600");

    printWindow.document.write(`
        <html>
        <head>
        <title>Receipt</title>
        <style>
        body{
            font-family: Arial;
            padding:30px;
        }
        h2{
            text-align:center;
        }
        table{
            width:100%;
            border-collapse:collapse;
        }
        td{
            border:1px solid #000;
            padding:10px;
        }
        </style>
        </head>

        <body>

        <h2>Warehouse Receipt</h2>

        <table>

        <tr>
        <td><b>Warehouse</b></td>
        <td>${warehouse}</td>
        </tr>

        <tr>
        <td><b>From</b></td>
        <td>${from_loc}</td>
        </tr>

        <tr>
        <td><b>To</b></td>
        <td>${to_loc}</td>
        </tr>

        <tr>
        <td><b>Contact</b></td>
        <td>${contact}</td>
        </tr>

        <tr>
        <td><b>Schedule Date</b></td>
        <td>${date}</td>
        </tr>

        <tr>
        <td><b>Status</b></td>
        <td>${status}</td>
        </tr>

        </table>

        </body>
        </html>
    `);

    printWindow.document.close();

    printWindow.onload = function(){
        printWindow.print();
    }

}

</script>

</body>
</html>
