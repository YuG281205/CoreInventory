<!DOCTYPE html>

<html>
<head>
<title>Warehouse List</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:40px;
}

h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

thead{
    background:#34495e;
    color:white;
}

th, td{
    padding:12px 15px;
    text-align:left;
}

th{
    font-weight:600;
}

tbody tr{
    border-bottom:1px solid #ddd;
}

tbody tr:nth-child(even){
    background:#f8f9fb;
}

tbody tr:hover{
    background:#eef3f7;
}

</style>

</head>

<body>

<h2>Warehouse List</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>City</th>
<th>State</th>
<th>Pincode</th>
</tr>
</thead>

<tbody>

{% for warehouse in warehouses %}

<tr>
<td>{{ warehouse.w_id }}</td>
<td>{{ warehouse.w_name }}</td>
<td>{{ warehouse.w_location }}</td>
<td>{{ warehouse.location.state }}</td>
<td>{{ warehouse.location.pincode }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</body>
</html>
